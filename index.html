<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo_icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Circle Store - Premium E-commerce Experience</title>
    <meta
      name="description"
      content="Circle Store offers a premium shopping experience with the latest fashion, electronics, and home living products. Fast delivery, secure payments, and 24/7 support."
    />
    <meta
      name="keywords"
      content="Circle Store, online shopping, fashion, electronics, home decor, premium brands, fast delivery, secure payment, best deals 2025"
    />
    <link rel="canonical" href="https://circlestore.com/" />

    <!-- Open Graph Meta Tags -->
    <meta
      property="og:title"
      content="Circle Store - Premium Shopping Platform"
    />
    <meta
      property="og:description"
      content="Discover the best deals on fashion, electronics, and more at Circle Store. Quality products with global shipping."
    />
    <meta
      property="og:image"
      content="https://circlestore.com/logo.png"
    />
    <meta property="og:url" content="https://circlestore.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Circle Store - Shop the Future" />
    <meta
      name="twitter:description"
      content="Premium e-commerce experience with top-tier brands and lightning-fast logistics."
    />
    <meta
      name="twitter:image"
      content="https://circlestore.com/logo.png"
    />

    <!-- Additional SEO Meta Tags -->
    <meta name="author" content="Circle Store Team" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />

    <!-- Structured Data for Online Store -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "OnlineStore",
        "name": "Circle Store",
        "description": "Premium e-commerce platform for fashion, electronics, and home living.",
        "url": "https://circlestore.com",
        "image": "https://circlestore.com/logo.png",
        "telephone": "+90-534-716-87-54",
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.9",
          "reviewCount": "1250"
        },
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Central Plaza, Suite 400",
          "addressLocality": "Global",
          "addressCountry": "TR"
        },
        "openingHours": "Mo-Su 00:00-23:59",
        "priceRange": "$$",
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Circle Store Collections",
          "itemListElement": [
            {
              "@type": "OfferCatalog",
              "name": "Fashion",
              "itemListElement": [
                {
                  "@type": "Product",
                  "name": "Premium T-Shirts",
                  "brand": { "@type": "Brand", "name": "Circle" }
                },
                {
                  "@type": "Product",
                  "name": "Designer Denim",
                  "brand": { "@type": "Brand", "name": "Circle" }
                }
              ]
            },
            {
              "@type": "OfferCatalog",
              "name": "Electronics",
              "itemListElement": [
                {
                  "@type": "Product",
                  "name": "Smartphones & Accessories",
                  "brand": { "@type": "Brand", "name": "Novatek" }
                },
                {
                  "@type": "Product",
                  "name": "Audio Systems",
                  "brand": { "@type": "Brand", "name": "AudioX" }
                }
              ]
            }
          ]
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
